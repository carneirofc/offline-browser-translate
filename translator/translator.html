<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Translator</title>
    <link rel="stylesheet" href="translator.css">
    <link rel="icon" href="../icons/icon48.png" type="image/png">
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <img src="../icons/icon48.png" alt="Local LLM Translator" class="header-icon">
                <div>
                    <h1>Local LLM Translator</h1>
                    <p class="header-subtitle">Private, on-device translation with local LLMs</p>
                </div>
            </div>
            <div class="header-right">
                <div class="model-badge" id="modelBadge" title="Active model">
                    <span class="model-name" id="modelName">Loading model...</span>
                </div>
                <div class="status-indicator" id="statusIndicator" title="Checking connection...">
                    <span class="status-dot"></span>
                    <span class="status-text" id="statusText">Connecting...</span>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark/light theme" aria-label="Toggle theme">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Translator Area -->
        <main class="translator-main">
            <div class="translator-panels">
                <!-- Source Panel -->
                <div class="panel source-panel">
                    <div class="panel-header">
                        <div class="lang-selector" id="sourceLangSelector">
                            <button class="lang-selector-btn" id="sourceLangBtn" type="button">
                                <span class="lang-name" id="sourceLangName">English</span>
                                <span class="lang-arrow">▾</span>
                            </button>
                            <div class="lang-dropdown" id="sourceLangDropdown">
                                <div class="lang-search-wrapper">
                                    <input type="text" class="lang-search" id="sourceLangSearch"
                                        placeholder="Search languages..." autocomplete="off">
                                </div>
                                <div class="lang-pinned" id="sourceLangPinned"></div>
                                <div class="lang-divider"></div>
                                <div class="lang-list" id="sourceLangList"></div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-body">
                        <textarea id="sourceText" class="source-textarea" placeholder="Enter text to translate..."
                            rows="8"></textarea>
                        <div class="panel-footer">
                            <span class="char-count" id="charCount">0 characters</span>
                            <button class="clear-btn" id="clearBtn" title="Clear text" hidden>✕</button>
                        </div>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="swap-container">
                    <button class="swap-btn" id="swapBtn" title="Swap languages">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 16l-4-4 4-4" />
                            <path d="M17 8l4 4-4 4" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                        </svg>
                    </button>
                </div>

                <!-- Target Panel -->
                <div class="panel target-panel">
                    <div class="panel-header">
                        <div class="lang-selector" id="targetLangSelector">
                            <button class="lang-selector-btn" id="targetLangBtn" type="button">
                                <span class="lang-name" id="targetLangName">Spanish</span>
                                <span class="lang-arrow">▾</span>
                            </button>
                            <div class="lang-dropdown" id="targetLangDropdown">
                                <div class="lang-search-wrapper">
                                    <input type="text" class="lang-search" id="targetLangSearch"
                                        placeholder="Search languages..." autocomplete="off">
                                </div>
                                <div class="lang-pinned" id="targetLangPinned"></div>
                                <div class="lang-divider"></div>
                                <div class="lang-list" id="targetLangList"></div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="target-output" id="targetOutput">
                            <span class="placeholder-text">Translation will appear here...</span>
                        </div>
                        <div class="panel-footer target-footer">
                            <span class="translation-info" id="translationInfo"></span>
                            <button class="copy-btn" id="copyBtn" title="Copy translation" hidden>
                                📋 Copy
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Translate Button -->
            <div class="translate-bar">
                <button class="translate-btn" id="translateBtn">
                    <span class="btn-text">Translate</span>
                    <span class="btn-loading" hidden>
                        <span class="spinner"></span> Translating...
                    </span>
                </button>
                <span class="keyboard-hint">Ctrl + Enter</span>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p class="privacy-note">🔒 All translations stay on your device — powered by your local LLM</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span class="toast-icon">✅</span>
        <span class="toast-message">Copied!</span>
    </div>

    <script src="../languages.js"></script>
    <script src="translator.js"></script>
</body>

</html>
