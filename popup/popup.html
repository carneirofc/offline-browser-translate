<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local LLM Translator</title>
  <link rel="stylesheet" href="../native.css">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>🌐 Local LLM Translator</h1>
      <p class="subtitle">Private, on-device translation with local LLMs</p>
      <div class="status-dot-wrapper" id="providerStatus" title="Checking...">
        <span class="status-dot"></span>
      </div>
    </header>

    <section class="main-controls">
      <div class="form-group">
        <label for="modelTrigger">Model</label>
        <div class="lang-picker" id="modelPickerEl">
          <button type="button" id="modelTrigger" class="lang-picker-trigger model-picker-trigger" aria-haspopup="listbox" aria-expanded="false" disabled>
            <span id="modelTriggerLabel" class="lang-picker-label">Loading models...</span>
            <svg class="lang-picker-caret" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="modelMenu" class="lang-picker-menu" hidden>
            <div class="lang-picker-search-wrap">
              <input type="text" id="modelSearch" class="lang-picker-search" placeholder="Search models…" autocomplete="off" spellcheck="false" />
            </div>
            <ul id="modelList" class="lang-picker-list" role="listbox" tabindex="-1"></ul>
          </div>
        </div>
        <button id="refreshModels" class="icon-btn" title="Refresh models">↻</button>
      </div>

      <div class="form-group">
        <label for="langTrigger">Translate to</label>
        <div class="lang-picker" id="languagePicker">
          <button type="button" id="langTrigger" class="lang-picker-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="langTriggerLabel" class="lang-picker-label">English</span>
            <svg class="lang-picker-caret" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="langMenu" class="lang-picker-menu" hidden>
            <div class="lang-picker-search-wrap">
              <input type="text" id="langSearch" class="lang-picker-search" placeholder="Search languages…" autocomplete="off" spellcheck="false" />
            </div>
            <ul id="langList" class="lang-picker-list" role="listbox" tabindex="-1"></ul>
          </div>
        </div>
      </div>

      <!-- Source language (only for TranslateGemma) -->
      <div class="form-group source-lang-group" id="sourceLangGroup" hidden>
        <label>Source language: <span id="detectedLang" class="detected-lang">detecting...</span></label>
        <select id="sourceLangOverride" class="small-select">
          <option value="auto">Use detected</option>
          <!-- Populated dynamically -->
        </select>
      </div>

      <div class="button-group">
        <button id="translateBtn" class="primary-btn" disabled>
          <span class="btn-text">Translate Page</span>
          <span class="btn-loading" hidden>Translating...</span>
        </button>
        <button id="cancelBtn" class="cancel-btn" hidden title="Cancel translation">
          ✕
        </button>
        <button id="restoreBtn" class="secondary-btn" title="Toggle original/translated">
          Original
        </button>
      </div>
    </section>

    <section class="quick-options">
      <div class="checkbox-row">
        <input type="checkbox" id="floatingButton">
        <label for="floatingButton">Floating translate button</label>
      </div>
      <p class="quick-hint">Shows a translate button next to selected text. <strong>Requires permission to run on all websites.</strong></p>

      <div class="checkbox-row">
        <input type="checkbox" id="showGlow" checked>
        <label for="showGlow">Show translation glow effect</label>
      </div>
    </section>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
      <span class="toast-icon">✅</span>
      <span class="toast-message">Settings saved!</span>
    </div>

    <footer>
      <div class="footer-links">
        <button id="openOptions" class="secondary-btn" title="Open full settings page">⚙️ More Settings</button>
        <button id="openTranslator" class="secondary-btn">📝 Open Translator</button>
      </div>
      <p>All translations stay on your device</p>
    </footer>
  </div>

  <script src="../languages.js"></script>
  <script src="../defaults.js"></script>
  <script src="popup.js"></script>
</body>

</html>
